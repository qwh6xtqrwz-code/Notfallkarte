:root{
--priority-critical:#ef4444;
--priority-urgent:#f59e0b;
--priority-caution:#eab308;
--priority-stable:#22c55e;
--priority-info:#3b82f6;
--bg:#0f1117;--surface:#1a1d27;--surface2:#232736;--border:#2d3244;--text:#e8eaed;--text2:#9ca3af;--red:#ef4444;--red-bg:#2d1215;--green:#22c55e;--green-bg:#0d2818;--blue:#3b82f6;--blue-bg:#172554;--orange:#f59e0b;--orange-bg:#2d1f04;--purple:#a78bfa;--purple-bg:#1e1636;--cyan:#22d3ee;--cyan-bg:#0c2d33;--pink:#ec4899;--pink-bg:#2d1226}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);overscroll-behavior:none;overflow-x:hidden}
.app{max-width:430px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;background:var(--bg)}
.header{position:sticky;top:0;z-index:100;background:rgba(15,17,23,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top))}
.header-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.header h1{font-size:17px;font-weight:700;letter-spacing:-0.3px;flex:1}
.header-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;background:var(--red);color:white;letter-spacing:.5px;text-transform:uppercase}
.back-btn{background:var(--surface2);border:none;color:var(--text);width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.weight-bar{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding:2px 0}
.weight-bar::-webkit-scrollbar{display:none}
.weight-chip{flex-shrink:0;padding:5px 10px;border-radius:8px;font-size:12px;font-weight:500;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit}
.weight-chip.active{background:var(--blue);border-color:var(--blue);color:white;font-weight:700}
.custom-weight{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:4px}
.custom-weight input{width:52px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:5px 6px;font-size:13px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;text-align:center}
.custom-weight span{font-size:12px;color:var(--text2)}
.content{flex:1;padding:12px 16px 100px;overflow-y:auto}
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.home-card priority-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 14px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:8px}
.home-card priority-card:active{transform:scale(0.97)}
.home-card priority-card .icon-wrap{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.home-card priority-card h3{font-size:14px;font-weight:700;line-height:1.2}
.home-card priority-card p{font-size:11px;color:var(--text2);line-height:1.3}
.home-card priority-card.full-width{grid-column:1/-1}
.home-card priority-card.prio-rot{border-left:3px solid var(--red)}
.home-card priority-card.prio-orange{border-left:3px solid var(--orange)}
.home-card priority-card.prio-gelb{border-left:3px solid #facc15}
.home-card priority-card.prio-blau{border-left:3px solid var(--blue)}
.prio-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.3px;text-transform:uppercase;align-self:flex-start}
.prio-tag.rot{background:var(--red-bg);color:var(--red)}
.prio-tag.orange{background:var(--orange-bg);color:var(--orange)}
.prio-tag.gelb{background:#2d2904;color:#facc15}
.prio-tag.blau{background:var(--blue-bg);color:var(--blue)}
.section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin:20px 0 10px}
.section-title:first-child{margin-top:4px}
.drug-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px}
.drug-name{font-size:14px;font-weight:700;margin-bottom:2px}
.drug-conc{font-size:11px;color:var(--text2);margin-bottom:8px}
.drug-doses{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:6px;align-items:center}
.dose-box{display:flex;flex-direction:column;align-items:center;gap:2px}
.dose-value{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:18px;font-weight:700}
.dose-unit{font-size:11px;color:var(--text2)}
.dose-label{font-size:10px;color:var(--text2)}
.dose-ml{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:14px;font-weight:500;padding:4px 10px;border-radius:6px;margin-top:2px}
.drug-notes{font-size:11px;color:var(--orange);margin-top:6px;line-height:1.4}
.drug-route{display:inline-block;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;margin-right:4px;background:var(--blue-bg);color:var(--blue)}
.equip-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:8px}
.equip-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;text-align:center}
.equip-item .label{font-size:10px;color:var(--text2);margin-bottom:2px}
.equip-item .val{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:16px;font-weight:700}
.algo-split{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.algo-branch{border-radius:12px;padding:12px;border:2px solid}
.algo-branch h4{font-size:13px;font-weight:700;margin-bottom:4px}
.algo-branch p{font-size:12px;line-height:1.4}
.algo-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px}
.algo-box h4{font-size:13px;font-weight:700;margin-bottom:6px}
.algo-box ul{list-style:none;padding:0}
.algo-box ul li{font-size:12px;line-height:1.6;padding-left:12px;position:relative}
.algo-box ul li::before{content:'•';position:absolute;left:0;color:var(--text2)}
.abcde-card{background:var(--surface);border-radius:14px;border:1px solid var(--border);margin-bottom:10px;overflow:hidden}
.abcde-header{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.abcde-letter{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:white;flex-shrink:0}
.abcde-header h3{font-size:14px;font-weight:700;flex:1}
.abcde-body{padding:0 14px 14px}
.abcde-cols{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.abcde-col{background:var(--surface2);border-radius:8px;padding:10px}
.abcde-col h5{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin-bottom:6px}
.abcde-col li{font-size:12px;line-height:1.5;list-style:none;padding-left:10px;position:relative}
.abcde-col li::before{content:'›';position:absolute;left:0;color:var(--text2)}
.pews-category{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px}
.pews-category h4{font-size:13px;font-weight:700;margin-bottom:8px}
.pews-scores{display:flex;gap:4px}
.pews-score-btn{flex:1;padding:8px 4px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:11px;cursor:pointer;text-align:center;transition:all .15s;font-family:'DM Sans',sans-serif}
.pews-score-btn .score-num{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:14px;font-weight:700;display:block;margin-bottom:2px}
.pews-score-btn.s0{border-color:#22c55e33}.pews-score-btn.s1{border-color:#f59e0b33}.pews-score-btn.s2{border-color:#f9731633}.pews-score-btn.s4{border-color:#ef444433}
.pews-score-btn.active.s0{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.pews-score-btn.active.s1{background:var(--orange-bg);border-color:var(--orange);color:var(--orange)}
.pews-score-btn.active.s2{background:#2d1606;border-color:#f97316;color:#f97316}
.pews-score-btn.active.s4{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.pews-total{background:var(--surface);border:2px solid;border-radius:14px;padding:16px;text-align:center;margin:12px 0}
.pews-total .total-num{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:42px;font-weight:700;line-height:1}
.pews-total .total-label{font-size:12px;margin-top:4px}
.pews-total .total-action{font-size:14px;font-weight:700;margin-top:8px}
.phone-item{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:6px}
.phone-item .name{font-size:13px;font-weight:500}
.phone-item .number{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:16px;font-weight:700;color:var(--blue)}
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(15,17,23,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:6px 0;padding-bottom:max(6px,env(safe-area-inset-bottom));z-index:100}
.tab-btn{background:none;border:none;color:var(--text2);font-size:10px;font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 8px;cursor:pointer;transition:color .15s;min-width:54px}
.tab-btn.active{color:var(--blue)}
.info-banner{background:var(--blue-bg);border:1px solid rgba(59,130,246,0.3);border-radius:10px;padding:10px 12px;font-size:11px;color:var(--blue);line-height:1.4;margin-bottom:12px}
.warning-banner{background:var(--red-bg);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:10px 12px;font-size:11px;color:var(--red);line-height:1.4;margin-bottom:12px;font-weight:500}
.stufe-header{padding:10px 14px;border-radius:10px;margin-bottom:10px;font-size:14px;font-weight:700}
.expand-chevron{transition:transform .2s;color:var(--text2);font-size:14px}
.expand-chevron.open{transform:rotate(90deg)}
.dose-sep{color:var(--text2);align-self:center;font-size:16px}

.priority-card:nth-child(1){border-color:var(--priority-critical)}
.priority-card:nth-child(2){border-color:var(--priority-urgent)}
.priority-card:nth-child(3){border-color:var(--priority-critical)}
.priority-card:nth-child(4){border-color:var(--priority-critical)}
.priority-card:nth-child(5){border-color:var(--priority-urgent)}
.priority-card:nth-child(6){border-color:var(--priority-info)}
.priority-card:nth-child(7){border-color:var(--priority-urgent)}
.priority-card:nth-child(8){border-color:var(--priority-caution)}
.priority-card:nth-child(9){border-color:var(--priority-critical)}
</style>

// ─── UTILS ───
function R(n,d){
if(d!==undefined){const f=Math.pow(10,d);return Math.round(n*f)/f}
if(Math.abs(n)<0.01)return Math.round(n*1000)/1000;
if(Math.abs(n)<0.1)return Math.round(n*100)/100;
if(Math.abs(n)<1)return Math.round(n*100)/100;
if(Math.abs(n)<10)return Math.round(n*10)/10;
return Math.round(n);
}
function h(tag,cls,html,attrs){
const e=document.createElement(tag);
if(cls)e.className=cls;
if(html!==undefined&&html!==null)e.innerHTML=html;
if(attrs)Object.entries(attrs).forEach(([k,v])=>{
if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
else e.setAttribute(k,v);
});
return e;
}

function dose(d,kg){
let mg=R(d.dkg*kg);
if(d.max)mg=R(Math.min(d.dkg*kg,d.max));
return mg;
}
function ml(d,kg){
if(!d.mc)return null;
let mg=d.dkg*kg;
if(d.max)mg=Math.min(mg,d.max);
return R(mg/d.mc,2);
}

function drugCard(d,kg,color){
const c=h('div','drug-card');
if(d.defi){
const j1=Math.ceil(d.dkg*kg);
c.innerHTML=`<div class="drug-name" style="color:${color}">${d.name}</div>
<div class="drug-doses" style="margin-top:8px">
<div class="dose-box"><div class="dose-value" style="color:${color}">${j1}</div><div class="dose-unit">J (${d.dkg} J/kg)</div></div>
${d.u==='J'&&d.notes&&d.notes.includes('2. Wahl')?`<div class="dose-sep">→</div><div class="dose-box"><div class="dose-value" style="color:var(--red)">${Math.ceil(2*kg)}</div><div class="dose-unit">J (2. Wahl)</div></div>`
:`<div class="dose-sep">→</div><div class="dose-box"><div class="dose-value" style="color:var(--red)">${Math.min(Math.ceil(8*kg),360)}</div><div class="dose-unit">max J</div></div>`}
</div>`;
if(d.notes)c.innerHTML+=`<div class="drug-notes">${d.notes}</div>`;
return c;
}
if(d.inhal||d.vol){
c.innerHTML=`<div class="drug-name" style="color:${color}">${d.name}</div>
<div class="drug-conc">${d.conc}</div>
<div class="drug-notes">${d.notes}</div>`;
return c;
}
const mg=dose(d,kg);
const m=ml(d,kg);
let doses=`<div class="dose-box"><div class="dose-value" style="color:${color}">${mg}</div><div class="dose-unit">${d.u}</div></div>`;
if(m!==null)doses+=`<div class="dose-box"><div class="dose-ml" style="background:${color}15;color:${color}">${m} ml</div></div>`;
if(d.spr)doses+=`<div class="dose-box" style="justify-content:center"><div style="font-size:11px;color:var(--text2)">${d.spr(kg)}</div></div>`;
let extra='';

c.innerHTML=`<div class="drug-name" style="color:${color}">${d.name}</div>
<div class="drug-conc">${d.conc||''}${d.amp?' · '+d.amp:''}${extra}</div>
<div class="drug-doses">${doses}</div>
${d.notes?'<div class="drug-notes">'+d.notes+'</div>':''}`;
return c;
}

<div class="dose-box"><div class="dose-value" style="color:var(--red)">${adr}</div><div class="dose-unit">mg</div></div>
<div class="dose-box"><div class="dose-ml" style="background:var(--red-bg);color:var(--red)">${adrMl} ml</div></div></div>
<div class="drug-notes">Schockbar: nach dem 3. Schock, dann alle 4 Min.</div></div>
<div class="drug-card" style="border-color:rgba(59,130,246,0.3)">
<div class="drug-name" style="color:var(--blue)">Amiodaron</div>
<div class="drug-conc">5 mg/kg · Max. 2 Gaben (2. Gabe max. 150 mg)</div>
<div class="drug-doses" style="margin-top:6px">
<div class="dose-box"><div class="dose-value" style="color:var(--blue)">${amio}</div><div class="dose-unit">mg</div></div>
<div class="dose-box"><div class="dose-ml" style="background:var(--blue-bg);color:var(--blue)">${R(amio/50,2)} ml</div></div></div>
<div class="drug-notes">Alternative: Lidocain 1 mg/kg = 0,05 ml/kg → ${R(kg)} mg</div></div>
<div class="algo-box"><h4 style="color:var(--red)">Keine Unterbrechungen!</h4><p style="font-size:12px;line-height:1.5">CPR 2 min → Rhythmuskontrolle → weiter</p></div>
<div class="algo-split">
<div class="algo-box"><h4>Reversible Ursachen</h4><ul><li>Hypoxämie</li><li>Hypovolämie</li><li>Hypo-/Hyper K⁺/Ca²⁺/Mg/Gluc</li><li>Hypo-/Hyperthermie</li><li>Herzbeuteltamponade</li><li>Intoxikation</li><li>Thromboembolie</li><li>Spannungspneumothorax</li></ul></div>
<div class="algo-box"><h4>Quality CPR</h4><ul><li>Rea-Brett</li><li>100-120 /Min.</li><li>1/3 Thoraxtiefe</li><li>Thorax vollständig entlasten</li><li>Wechsel HDM alle 2 Min.</li><li>100% O₂</li></ul></div></div>`;
}

function renderPEWS(el){
const scores=state.pewsScores;
const total=Object.values(scores).reduce((a,b)=>a+b,0);
let act,actC,actBg;
if(total>=10){act="INTENSIV VERSTÄNDIGEN";actC="#7f1d1d";actBg="#451a1a"}
else if(total>=8){act="INTENSIV VERSTÄNDIGEN";actC="var(--red)";actBg="var(--red-bg)"}
else if(total>=6){act="ARZT SOFORT VERSTÄNDIGEN";actC="var(--red)";actBg="var(--red-bg)"}
else if(total>=4){act="PEWS stündlich";actC="var(--orange)";actBg="var(--orange-bg)"}
else{act="PEWS alle 4h";actC="var(--green)";actBg="var(--green-bg)"}
el.innerHTML=`<div class="section-title" style="color:var(--orange)">Modified Bedside PEWS</div>
<div class="pews-total" style="border-color:${actC};background:${actBg}">
<div class="total-num" style="color:${actC}">${total}</div>
<div class="total-label" style="color:var(--text2)">Gesamtscore</div>
<div class="total-action" style="color:${actC}">${act}</div></div>`;
PEWS_CATS.forEach(cat=>{
const div=h('div','pews-category');
let btns='';
cat.o.forEach(opt=>{
const active=scores[cat.k]===opt.s;
btns+=`<button class="pews-score-btn s${opt.s} ${active?'active':''}" data-cat="${cat.k}" data-score="${opt.s}">
<span class="score-num">${opt.s}</span><span style="white-space:pre-line">${opt.l}</span></button>`;
});
div.innerHTML=`<h4>${cat.n}</h4><div class="pews-scores">${btns}</div>`;
div.querySelectorAll('.pews-score-btn').forEach(btn=>{
btn.onclick=()=>{
const k=btn.dataset.cat;const s=parseInt(btn.dataset.score);
if(scores[k]===s)delete state.pewsScores[k];
else state.pewsScores[k]=s;
render();
};
});
el.appendChild(div);
});
el.innerHTML+=`<div style="font-size:11px;color:var(--text2);text-align:center;margin-top:8px;line-height:1.4">
Bei kritisch kranken Patienten trotz gutem Score oder einem einzelnen Wert von 4 bitte Arzt verständigen.<br>
Bei Score &lt; 4 PEWS alle 8h erheben.<br>Soeteman, M. et al. (2021), BMJ open, 11(5).</div>`;
}

function renderPhone(el){
el.innerHTML=`<div class="section-title">Telefonnummern</div><div class="info-banner">St. Anna Kinderspital · Intern</div>`;
PHONES.forEach(p=>{
el.innerHTML+=`<div class="phone-item"><span class="name">${p.n}</span><span class="number">${p.t}</span></div>`;
});
el.innerHTML+=`<div style="height:16px"></div>
<div class="drug-card"><div class="drug-name" style="color:var(--red)">Notruf</div>
<div style="font-size:12px;margin-top:6px;line-height:1.6"><strong>Im Zimmer:</strong> 1) Pflege Anwesend → 2) Arztruf<br><strong>Am Stützpunkt:</strong> Arztnotruf</div></div>
<div style="height:12px"></div>
<div style="font-size:10px;color:var(--text2);text-align:center;line-height:1.4">
Impressum: St. Anna Kinderspital: Station 1B, Anästhesie<br>
Kontakt: Dr. Titieni-Schuhmann, Dr. Witt · Stand 12/2024<br>
Quellen: ERC Guidelines (cprguidelines.eu); GRC (grc-org.de)</div>`;
}

// ─── TITLES ───
const TITLES={home:"Notfallkarte",reanimation:"Reanimation",intubation:"Intubation",seizure:"Krampfanfall",
anaphylaxis:"Anaphylaxie",svt:"SVT",antagonists:"Antagonisierung",sepsis:"Sepsis",
abcde:"ABCDE",herzstillstand:"Herzstillstand",pews:"PEWS Score",phone:"Telefon"};
const NOWEIGHT=new Set(['home','abcde','pews','phone','sepsis']);

// ─── MAIN RENDER ───
function render(){
const app=document.getElementById('app');
const pg=state.page;
const needsW=!NOWEIGHT.has(pg);

// Header
let header=`<div class="header"><div class="header-top">`;
if(pg!=='home')header+=`<button class="back-btn" id="backBtn">${ICO.back}</button>`;
header+=`<h1>${TITLES[pg]||'Notfallkarte'}</h1><span class="header-badge">Notfall</span></div>`;
if(needsW){
header+=`<div class="weight-bar">`;
AGE_PRESETS.forEach((p,i)=>{
header+=`<button class="weight-chip ${state.preset===i?'active':''}" data-pi="${i}" data-kg="${p.kg}">${p.l} ${p.kg}kg</button>`;
});
header+=`<div class="custom-weight"><input type="number" inputmode="decimal" value="${state.weight}" id="wInput"><span>kg</span></div></div>`;
}
header+=`</div>`;

// Tab bar
const tabs=`<div class="tab-bar">
<button class="tab-btn ${pg==='home'?'active':''}" data-page="home">${ICO.home}<span>Home</span></button>
<button class="tab-btn ${pg==='herzstillstand'?'active':''}" data-page="herzstillstand">${ICO.heart}<span>CPR</span></button>
<button class="tab-btn ${pg==='pews'?'active':''}" data-page="pews">${ICO.clip}<span>PEWS</span></button>
<button class="tab-btn ${pg==='phone'?'active':''}" data-page="phone">${ICO.phone}<span>Telefon</span></button>
</div>`;

app.innerHTML=header+`<div class="content" id="content"></div>`+tabs;

// Content
const content=document.getElementById('content');
const renderers={home:renderHome,reanimation:renderReanimation,intubation:renderIntubation,
seizure:renderSeizure,anaphylaxis:renderAnaphylaxis,svt:renderSVT,antagonists:renderAntagonists,
sepsis:renderSepsis,abcde:renderABCDE,herzstillstand:renderHerzstillstand,pews:renderPEWS,phone:renderPhone};
(renderers[pg]||renderHome)(content);

// Events
const backBtn=document.getElementById('backBtn');
if(backBtn)backBtn.onclick=()=>{state.page='home';render();window.scrollTo(0,0)};

document.querySelectorAll('.weight-chip').forEach(btn=>{
btn.onclick=()=>{
state.preset=parseInt(btn.dataset.pi);
state.weight=parseFloat(btn.dataset.kg);
render();
};
});

const wInput=document.getElementById('wInput');
if(wInput)wInput.onchange=e=>{
state.weight=parseFloat(e.target.value)||0;
state.preset=-1;
render();
};

document.querySelectorAll('.tab-btn').forEach(btn=>{
btn.onclick=()=>{state.page=btn.dataset.page;render();window.scrollTo(0,0)};
});
}

render();
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
